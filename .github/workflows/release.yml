name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X 'main.appVersion=0.1.4'" -o "dist/codeindex-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./src

      - name: Package Unix release
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          cd dist
          tar -czf "codeindex-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "codeindex-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Package Windows release
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/codeindex-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" -DestinationPath "dist/codeindex-${{ matrix.goos }}-${{ matrix.goarch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeindex-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: ignore
          path: |
            dist/codeindex-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/codeindex-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            dist/codeindex-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create checksums
        shell: bash
        run: |
          cd dist
          find . -type f \( -name 'codeindex-*' -o -name '*.exe' \) -print0 | xargs -0 sha256sum > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v0.1.4
          tag_name: ${{ github.ref_name }}
          files: |
            dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
